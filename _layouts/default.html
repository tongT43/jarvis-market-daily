<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="masthead">
      <a href="{{ '/' | relative_url }}" class="brand">JARVIS<span>MARKETS</span></a>
      <div class="date">{{ site.time | date: '%A %d %B %Y' }}</div>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer>Genere automatiquement par Jarvis - <a href="https://github.com/tongT43/jarvis-market-daily">Source</a></footer>
</body>
</html>
